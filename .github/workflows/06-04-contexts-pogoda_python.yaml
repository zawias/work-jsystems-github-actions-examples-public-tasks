# See 06-contexts/README.md for more information
# about the how to use contexts in GitHub Actions.

name: "06-04 - Pogoda Info Python"
run-name: 06-04 - Python Pogoda dla ${{ inputs.city }}

on:
  workflow_dispatch:
    inputs:
      city:
        description: "City to get weather info for"
        type: string
        default: "Warsaw"

env:
  MY_KLUCZYK: '7cff9972d5c98a9a47ddf6a59cb34d8e'
  API_KEY: ${{ secrets.MY_API_KEY_W }}

jobs:
  pogoda-info:
    name: Pobierz informacje o pogodzie
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./CWICZENIA/06-context/pogoda_python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Sprawdzanie pogody
        run: |
          python3 ./start.py "${{ inputs.city }}" "${{ env.API_KEY }}" >> $GITHUB_STEP_SUMMARY
          python3 --version >> $GITHUB_STEP_SUMMARY
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Sprawdzanie pogody
        run: |
          python3 ./start.py "${{ inputs.city }}" "${{ env.API_KEY }}" >> $GITHUB_STEP_SUMMARY
          python3 --version >> $GITHUB_STEP_SUMMARY
