name: 03 - Workflow Runners v1

on:
  workflow_dispatch:

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on an Ubuntu runner."
          echo "$RUNNER_OS"
      - name: CPU info
        shell: bash
        run: |
          echo "CPU info:"
          lscpu
          free -mh
          df -h

  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on a Windows runner."
          echo "$RUNNER_OS"

  mac-echo:
    runs-on: macos-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on a MacOS runner."
          echo "$RUNNER_OS"

  self-hosted-echo:
    runs-on: piotrkoska
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on a self-hosted runner."
          echo "$RUNNER_OS"
